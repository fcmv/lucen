name: Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  # A large-budget run of the property and fuzz suites. The dev profile runs a
  # small example budget on every PR; this lane runs the nightly profile so a
  # rare counterexample has time to be found.
  extended-fuzz:
    name: extended fuzz (nightly budget)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest hypothesis
          maturin build --release --out dist
          pip install --no-index --find-links dist lucen
      - name: Run property and fuzz suites at nightly budget
        env:
          HYPOTHESIS_PROFILE: nightly
        run: pytest -q tests/property

      - name: Run the same suites on the pure-Python fallback
        env:
          HYPOTHESIS_PROFILE: nightly
          LUCEN_DISABLE_NATIVE: "1"
        run: pytest -q tests/property

  miri:
    name: miri (nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: cargo miri test
        run: cargo miri test --manifest-path lucen_core/Cargo.toml

  # Records the full benchmark as an artifact (the historical performance log)
  # and compares the machine-independent speedup ratios against the committed
  # baseline. Correctness regressions are fatal; a speedup drop is reported.
  # The absolute-speedup magnitude depends on the runner core count, so the
  # hard regression gate is the speedup-floor test in the main suite.
  perf-tracking:
    name: perf tracking (record + compare)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest hypothesis
          maturin build --release --out dist
          pip install --no-index --find-links dist lucen
      - name: Run benchmark and compare to baseline
        env:
          PYTHONPATH: tests/benchmarks
        run: |
          python tests/benchmarks/matrix_bench.py bench-current.json
          python tests/benchmarks/compare_baseline.py \
            tests/benchmarks/results/py311.json bench-current.json
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ github.run_number }}
          path: bench-current.json

  # Mutation testing on the correctness core: inject one change per mutant and
  # check the suite kills it. It runs on the pure-Python path (native disabled)
  # so the fallback code is exercised rather than shadowed by the native core,
  # and against the source (editable install) so mutants are actually seen. Non
  # gating and time bounded; survivors (mutations no test killed) are uploaded
  # for triage. Some survivors are equivalent mutants, so the report is a review
  # queue, not a score to defend.
  mutation:
    name: mutation testing (survivors report)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 180
    env:
      LUCEN_DISABLE_NATIVE: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest hypothesis "mutmut==2.5.1"
          pip install -e .
      - name: Mutate the correctness core and kill mutants with the suite
        run: |
          timeout 150m mutmut run \
            --paths-to-mutate "lucen/execution/_accel.py,lucen/execution/runtime.py,lucen/execution/planning.py,lucen/analysis/purity.py,lucen/execution/dispatch.py" \
            --runner "python -m pytest -x -q tests/unit tests/property" \
            --tests-dir "tests/" \
            --no-progress --CI || true
      - name: Survivors report
        if: always()
        run: mutmut results | tee mutation-survivors.txt || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-survivors
          path: mutation-survivors.txt
