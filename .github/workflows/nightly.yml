name: Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  # A large-budget run of the property and fuzz suites. The dev profile runs a
  # small example budget on every PR; this lane runs the nightly profile so a
  # rare counterexample has time to be found.
  extended-fuzz:
    name: extended fuzz (nightly budget)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest hypothesis
          maturin build --release --out dist
          pip install --no-index --find-links dist lucen
      - name: Run property and fuzz suites at nightly budget
        env:
          HYPOTHESIS_PROFILE: nightly
        run: pytest -q tests/property

      - name: Run the same suites on the pure-Python fallback
        env:
          HYPOTHESIS_PROFILE: nightly
          LUCEN_DISABLE_NATIVE: "1"
        run: pytest -q tests/property

  miri:
    name: miri (nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: cargo miri test
        run: cargo miri test --manifest-path lucen_core/Cargo.toml

  # Records the full benchmark as an artifact (the historical performance log)
  # and compares the machine-independent speedup ratios against the committed
  # baseline. Correctness regressions are fatal; a speedup drop is reported.
  # The absolute-speedup magnitude depends on the runner core count, so the
  # hard regression gate is the speedup-floor test in the main suite.
  perf-tracking:
    name: perf tracking (record + compare)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest hypothesis
          maturin build --release --out dist
          pip install --no-index --find-links dist lucen
      - name: Run benchmark and compare to baseline
        env:
          PYTHONPATH: tests/benchmarks
        run: |
          python tests/benchmarks/matrix_bench.py bench-current.json
          python tests/benchmarks/compare_baseline.py \
            tests/benchmarks/results/py311.json bench-current.json
      - uses: actions/upload-artifact@v7
        with:
          name: benchmark-${{ github.run_number }}
          path: bench-current.json
