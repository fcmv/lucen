name: Docs

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Build the site on every PR so a broken docs build is caught in review.
  build:
    name: build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs tooling
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material "mkdocstrings[python]"
      - name: Build
        env:
          PYTHONPATH: .
        run: mkdocs build

  # Publish to GitHub Pages from main.
  deploy:
    name: deploy to Pages
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs tooling
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material "mkdocstrings[python]"
      - name: Build
        env:
          PYTHONPATH: .
        run: mkdocs build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
