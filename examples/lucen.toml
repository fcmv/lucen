# Example project configuration (spec 8). Precedence:
# built-in naive default < [defaults] < per-block pragma clause < [limits] clamp.

[scope]
include = []            # empty: everything under the activation root
exclude = ["generated/*"]

[defaults]
pool_size = 8
chunks = 0              # 0 = auto (4 x workers)
calibrate = "auto"
reduction_order = "sequential_equivalent"

[limits]
max_threads_per_block = 32
max_timeout_seconds = 300
allow_experimental = false

[strict]
default = false
allow = ["monotonic"]

[errors]
mode = "report"         # "report" | "quiet" | "hard"
